<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCar - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            border: none;
            border-radius: 12px;
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="card card-login shadow-lg p-4 bg-white">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Sistema RentCar</h3>
            <p class="text-muted small">Inicie sesión para administrar la plataforma</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} p-2 small text-center" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/autenticar" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Correo Electrónico</label>
                <input type="email" name="txt_correo" class="form-control" placeholder="admin@rentcar.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Contraseña</label>
                <input type="password" name="txt_clave" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Entrar al Sistema</button>
        </form>
    </div>

</body>
</html>
